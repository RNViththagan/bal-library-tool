name: Sync SQLite indexes from LS release

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      ls_version:
        description: 'LS release tag to sync from (e.g. v1.7.0). Leave empty to use latest.'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve LS release tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.ls_version }}" ]; then
            TAG="${{ github.event.inputs.ls_version }}"
          else
            TAG=$(curl -s https://api.github.com/repos/ballerina-platform/ballerina-language-server/releases/latest \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved LS tag: $TAG"

      - name: Check if already synced
        id: check
        run: |
          CURRENT=$(cat .ls-version 2>/dev/null || echo "none")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "${{ steps.resolve.outputs.tag }}" ]; then
            echo "already_synced=true" >> "$GITHUB_OUTPUT"
            echo "Already synced to ${{ steps.resolve.outputs.tag }}, skipping."
          else
            echo "already_synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download LS fat JAR
        if: steps.check.outputs.already_synced == 'false'
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          VERSION="${TAG#v}"
          JAR_NAME="ballerina-language-server-${VERSION}.jar"
          URL="https://github.com/ballerina-platform/ballerina-language-server/releases/download/${TAG}/${JAR_NAME}"
          echo "Downloading $URL ..."
          curl -fL --retry 3 -o ls.jar "$URL"

      - name: Extract SQLite indexes
        if: steps.check.outputs.already_synced == 'false'
        run: |
          jar xf ls.jar search-index.sqlite central-index.sqlite
          mv search-index.sqlite src/main/resources/search-index.sqlite
          mv central-index.sqlite src/main/resources/central-index.sqlite
          rm ls.jar

      - name: Update .ls-version
        if: steps.check.outputs.already_synced == 'false'
        run: echo "${{ steps.resolve.outputs.tag }}" > .ls-version

      - name: Check for changes
        id: changes
        if: steps.check.outputs.already_synced == 'false'
        run: |
          if git diff --quiet src/main/resources/search-index.sqlite src/main/resources/central-index.sqlite .ls-version 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.already_synced == 'false' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/search-index.sqlite src/main/resources/central-index.sqlite .ls-version
          git commit -m "Sync SQLite indexes from LS ${{ steps.resolve.outputs.tag }}"
          git push
